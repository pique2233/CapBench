<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Admin Membership Form</title>
  </head>
  <body>
    <h1>Membership Change</h1>
    <form>
      <label for="account_id">Account ID</label>
      <input id="account_id" name="account_id" value="acct-4471" />

      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="viewer">viewer</option>
        <option value="analyst">analyst</option>
        <option value="manager">manager</option>
      </select>

      <label for="notification_mode">Notification Mode</label>
      <select id="notification_mode" name="notification_mode">
        <option value="none">none</option>
        <option value="digest-only">digest-only</option>
        <option value="all-events">all-events</option>
      </select>

      <label for="reason">Reason</label>
      <textarea id="reason" name="reason"></textarea>
    </form>
  </body>
</html>
